name: PPNO
version: "0.3.1"
default_prefix: "C:\\ppno"
company: "Andrés García Martínez"

# The channels to search for packages. 
# The build script will add the local build folder here.
channels:
  - conda-forge
  - defaults

# Packages to include in the standalone installer
specs:
  - python 3.9*
  - ppno 0.3.1
  - numpy
  - scipy
  - pygmo

# Specify the installer UI (on Windows, this creates a NSIS-based .exe)
# You can customize icons and license here if desired.
# license_file: LICENSE

# This ensures that the 'ppno' command is available in the installed environment
# and optionally creates a Start Menu entry.
menu_packages:
  - ppno

# Set to true to include the 'conda' command in the installer (usually not needed for end-users)
# include_conda: false

# Post-install script can be used for extra setup if needed
# post_install: post_install.bat
